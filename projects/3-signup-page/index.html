<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css"></link>    
</head>
<body>
    
    <div class="lhs">
        <img class="bg-img" src="./page-image.avif"/>
        <div class="logo-banner">
            <img class="logo-img" src="./page-image-logo.png" />
            <h1>ODIN</h1>
        </div>

    </div>

    <div class="rhs">
        <div class="upper-text-content">
            <p class="rhs-upper-text">
                This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started.
            </p>
            <p class="rhs-upper-text">
                You <em>know</em> you want to.
            </p>
        </div>
        <form class="form" >
            <h2>Let's do this</h2>
            <div>
                <div>
                    <label for="first_name">first name</label>
                    <input type="text" id="first_name" name="first_name" placeholder="Justin" required>
                </div>
                <div>
                    <label for="last_name">last name</label>
                    <input type="text" id="last_name" name="last_name" placeholder="Shaw" required>
                </div>
            </div>
            <div>
                <div>
                    <label for="email">email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="phone">phone number</label>
                    <input type="tel" id="phone" required>
                </div>
            </div>
            <div>
                <div>
                    <label for="password">password</label>
                    <input type="password" id="password" name="password" minlength="4" required>
                </div>
                <div>
                    <label for="confirm-password" >confirm password</label>
                    <input type="password" id="confirm-password" name="confirm-password" minlength="4" required>
                </div>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <p class="log-in">Already have an account? <a>Log in</a></p>    
    </div>
</body>
</html>
